# HELYOS — Infrastructure locale (opt-in).
#
# Le Kernel Jarvis fonctionne SANS ces services (Local First, ADN 2). Ce compose
# fournit la stack complète quand on veut brancher la mémoire persistante, la
# recherche vectorielle, les LLM locaux et l'observabilité (CODEX/07_TECH).
#
#   docker compose -f deploy/docker-compose.yml up -d
#
# Profils : démarrez seulement ce dont vous avez besoin.
#   docker compose --profile core up -d           # postgres + redis
#   docker compose --profile memory up -d         # + qdrant
#   docker compose --profile llm up -d            # + ollama
#   docker compose --profile observability up -d  # + prometheus + grafana + loki

name: helyos

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["core", "all"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helyos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helyos}
      POSTGRES_DB: ${POSTGRES_DB:-helyos}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helyos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["core", "all"]
    ports: ["6379:6379"]
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes: ["redisdata:/data"]

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["memory", "all"]
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrantdata:/qdrant/storage"]

  minio:
    image: minio/minio:latest
    profiles: ["memory", "all"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-helyos}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-helyos-secret}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  ollama:
    image: ollama/ollama:latest
    profiles: ["llm", "all"]
    ports: ["11434:11434"]
    volumes: ["ollamadata:/root/.ollama"]

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability", "all"]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability", "all"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-helyos}
    ports: ["3000:3000"]
    volumes: ["grafanadata:/var/lib/grafana"]

  loki:
    image: grafana/loki:latest
    profiles: ["observability", "all"]
    ports: ["3100:3100"]

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:
  ollamadata:
  grafanadata:
