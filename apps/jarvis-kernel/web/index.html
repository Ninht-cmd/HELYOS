<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HELYOS</title>
<style>
  :root{
    --bg0:#04060a; --ink:#eaf1fb; --muted:#8a98ad; --faint:#5a6678;
    --mint:#6ff7d6; --cyan:#49b6ff; --violet:#b69bff; --amber:#ffce6a; --coral:#ff7a8a;
    --glass:rgba(255,255,255,.045); --line:rgba(255,255,255,.09);
    --spring:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:
      radial-gradient(80% 60% at 30% 20%, rgba(73,182,255,.10), transparent 60%),
      radial-gradient(70% 60% at 75% 85%, rgba(182,155,255,.10), transparent 60%),
      var(--bg0);
    color:var(--ink);font-family:-apple-system,"SF Pro Display","Segoe UI",Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;letter-spacing:.2px}
  #scene{position:fixed;inset:0;z-index:0}
  #scene canvas{display:block}
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 12%,transparent 42%,rgba(0,0,0,.6) 100%)}
  .layer{position:fixed;inset:0;z-index:2;pointer-events:none}
  .layer>*{pointer-events:auto}

  .top{position:fixed;top:0;left:64px;right:0;z-index:6;display:flex;align-items:center;gap:13px;
    padding:18px 26px;font-size:13px;color:var(--muted)}
  .brand{font-weight:700;letter-spacing:3px;color:var(--ink)} .brand b{color:var(--mint)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 12px var(--mint);animation:bp 2.4s infinite}
  @keyframes bp{0%,100%{opacity:1}50%{opacity:.3}}
  .top .sp{flex:1}.top a{color:var(--faint);text-decoration:none;transition:.3s}.top a:hover{color:var(--mint)}

  .rail{position:fixed;left:0;top:0;bottom:0;width:64px;z-index:6;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px}
  .rail .u{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:18px;color:var(--muted);
    cursor:pointer;border:1px solid transparent;transition:.35s var(--spring);position:relative}
  .rail .u:hover{color:var(--ink);background:var(--glass);border-color:var(--line);transform:translateX(3px)}
  .rail .u.on{color:#04221b;background:linear-gradient(180deg,var(--mint),#39d3b3);box-shadow:0 6px 22px rgba(111,247,214,.32)}
  .rail .tip{position:absolute;left:54px;white-space:nowrap;background:#0a121c;border:1px solid var(--line);
    padding:5px 10px;border-radius:9px;font-size:12px;color:var(--ink);opacity:0;transform:translateX(-6px);
    transition:.25s var(--spring);pointer-events:none}
  .rail .u:hover .tip{opacity:1;transform:translateX(0)}

  .center{position:fixed;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 24px 0 80px;pointer-events:none}
  .hero{text-align:center;max-width:740px;transition:.7s var(--spring);pointer-events:auto}
  .hero.lift{transform:translateY(-24vh) scale(.84);opacity:0;pointer-events:none}
  .greet{font-size:clamp(36px,6.2vw,66px);font-weight:200;line-height:1.04;
    background:linear-gradient(180deg,#fff,#a9b8cc);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    animation:rise .9s var(--spring) both;text-shadow:0 2px 40px rgba(111,247,214,.15)}
  .greet .nm{font-weight:500;background:linear-gradient(120deg,var(--mint),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .ask{margin-top:14px;color:var(--muted);font-size:clamp(15px,2vw,19px);font-weight:300;animation:rise 1s .1s var(--spring) both}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .composer{margin-top:36px;width:min(700px,86vw);position:relative;animation:rise 1.1s .2s var(--spring) both}
  .composer .ring{position:absolute;inset:-1px;border-radius:18px;padding:1px;
    background:conic-gradient(from 0deg,var(--mint),var(--cyan),var(--violet),var(--mint));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
    opacity:.55;animation:spin 8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .composer form{position:relative;display:flex;align-items:center;gap:10px;background:rgba(8,13,20,.66);
    backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:18px;padding:8px 8px 8px 18px;
    box-shadow:0 30px 70px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.05)}
  .composer .pulse{width:11px;height:11px;border-radius:50%;flex:none;background:radial-gradient(circle at 35% 35%,#fff,var(--mint));box-shadow:0 0 16px var(--mint);animation:bp 2s infinite}
  .composer input{flex:1;background:transparent;border:0;outline:0;color:var(--ink);font-size:17px;padding:13px 0;font-family:inherit}
  .composer input::placeholder{color:var(--faint)}
  .composer .send{flex:none;width:42px;height:42px;border-radius:13px;border:0;cursor:pointer;color:#04221b;
    background:linear-gradient(160deg,var(--mint),#34c9a8);font-size:18px;transition:.3s var(--spring)}
  .composer .send:hover{filter:brightness(1.12);transform:scale(1.06)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;animation:rise 1.2s .3s var(--spring) both}
  .chip{font-size:12.5px;color:var(--muted);background:var(--glass);border:1px solid var(--line);padding:7px 12px;border-radius:11px;cursor:pointer;transition:.3s var(--spring)}
  .chip:hover{color:var(--ink);border-color:var(--mint);transform:translateY(-2px)}

  .stream{position:fixed;inset:0;z-index:4;display:none;flex-direction:column;align-items:center;
    padding:88px 24px 60px 104px;overflow:auto;pointer-events:auto}
  .stream.show{display:flex}
  .thread{width:min(720px,90vw);display:flex;flex-direction:column;gap:16px}
  .msg{display:flex;gap:12px;align-items:flex-start;animation:rise .45s var(--spring) both}
  .msg .av{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;font-size:13px;font-weight:700}
  .msg.u{flex-direction:row-reverse}
  .msg.u .bubble{background:rgba(73,182,255,.10);border-color:rgba(73,182,255,.26)}
  .msg.u .av{background:rgba(73,182,255,.16);color:var(--cyan)}
  .msg.j .av{background:linear-gradient(160deg,var(--mint),#2bbfa0);color:#04221b}
  .bubble{background:rgba(10,15,23,.6);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:14px;padding:13px 16px;font-size:15px;line-height:1.55;max-width:78%}
  .bubble .v{display:inline-flex;align-items:center;gap:8px;margin-top:9px;font-size:12.5px;padding:5px 10px;border-radius:9px;font-weight:600}
  .v.allow{background:rgba(111,247,214,.12);color:var(--mint)}
  .v.deny{background:rgba(255,122,138,.12);color:var(--coral)}
  .v.require_validation{background:rgba(255,206,106,.12);color:var(--amber)}
  .think{display:inline-flex;gap:5px;align-items:center;color:var(--muted)}
  .think i{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:th 1s infinite}
  .think i:nth-child(2){animation-delay:.15s}.think i:nth-child(3){animation-delay:.3s}
  @keyframes th{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

  .panel{position:fixed;z-index:5;background:rgba(8,12,19,.5);backdrop-filter:blur(18px);border:1px solid var(--line);
    border-radius:16px;padding:14px 15px;box-shadow:0 18px 50px rgba(0,0,0,.42);transition:.6s var(--spring)}
  .panel h4{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--faint);margin-bottom:11px;display:flex;align-items:center;gap:7px}
  .panel h4 .d{width:6px;height:6px;border-radius:50%}
  .agents{left:80px;top:92px;width:240px}.agents .d{background:var(--mint)}
  .ag{margin-bottom:12px}
  .ag .r{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
  .ag .r span{color:var(--faint);font-size:11.5px}
  .bar{height:5px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden}
  .bar i{display:block;height:100%;width:0;border-radius:4px;background:linear-gradient(90deg,var(--mint),var(--cyan));transition:width .9s var(--spring)}
  .thoughts{right:24px;top:92px;width:262px}.thoughts .d{background:var(--violet)}
  .thoughts .t{font-size:13px;color:var(--muted);line-height:1.5;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);animation:rise .5s var(--spring) both}
  .thoughts .t b{color:var(--violet)}
  .world{right:24px;bottom:24px;width:262px}.world .d{background:var(--cyan)}
  .world .n{display:flex;align-items:center;gap:9px;font-size:13px;padding:6px 0;color:var(--muted)}
  .world .n .s{width:7px;height:7px;border-radius:50%;flex:none}
  .world .n .s.off{background:var(--faint)}.world .n .s.on{background:var(--mint);box-shadow:0 0 8px var(--mint)}
  .world .n em{margin-left:auto;font-style:normal;font-size:11px;color:var(--faint)}
  .goals{left:80px;bottom:24px;width:240px}.goals .d{background:var(--amber)}
  .goals .g{font-size:13px;margin-bottom:9px}
  .goals .g .r{display:flex;justify-content:space-between;margin-bottom:5px}
  .goals .g .r span{color:var(--amber);font-weight:600}
  .goals .bar i{background:linear-gradient(90deg,var(--amber),#ff9f6b)}
  .note{position:fixed;bottom:7px;left:0;right:0;text-align:center;z-index:3;font-size:11px;color:var(--faint)}
  @media(max-width:1120px){.thoughts,.world{display:none}}
  @media(max-width:820px){.agents,.goals,.rail{display:none}.top{left:0}.center{padding-left:24px}.stream{padding-left:24px}}
</style>
</head>
<body>
  <div id="scene"></div>
  <div class="vignette"></div>

  <nav class="rail" id="rail"></nav>
  <div class="top">
    <span class="brand"><b>H</b>ELYOS</span><span class="dot"></span><span id="state">intelligence active</span>
    <span class="sp"></span><span id="ver">v—</span><a href="/docs">API</a><a href="/info">info</a>
  </div>

  <div class="center">
    <div class="hero" id="hero">
      <div class="greet" id="greet">Bonjour <span class="nm">Emeric</span>.</div>
      <div class="ask">Que souhaites-tu accomplir aujourd'hui&nbsp;?</div>
      <div class="composer">
        <div class="ring"></div>
        <form id="form">
          <div class="pulse"></div>
          <input id="q" autocomplete="off" placeholder="Parle à HELYOS…  « analyse un contrat », « supprime un fichier », « fais un virement »">
          <button class="send" type="submit">↑</button>
        </form>
      </div>
      <div class="chips" id="chips"></div>
    </div>
  </div>
  <div class="stream" id="stream"><div class="thread" id="thread"></div></div>

  <aside class="panel agents"><h4><span class="d"></span>Agents</h4><div id="agents"></div></aside>
  <aside class="panel thoughts"><h4><span class="d"></span>Ce que Jarvis pense</h4><div id="thoughts"></div></aside>
  <aside class="panel world"><h4><span class="d"></span>Mon monde <em style="margin-left:auto;font-size:10px;color:var(--faint)">aperçu</em></h4><div id="world"></div></aside>
  <aside class="panel goals"><h4><span class="d"></span>Objectifs</h4><div id="goals"></div></aside>

  <div class="note">HELYOS — incarnation gouvernée · chaque action passe par la gouvernance A0–A5 · « Mon monde » = aperçu (connecteurs à venir)</div>

  <script type="importmap">{ "imports": { "three": "./vendor/three.module.js" } }</script>
  <script type="module" src="./app.js"></script>
</body>
</html>
